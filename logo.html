<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; }
        body {
            width: 1200px;
            height: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }
        .logo {
            text-align: center;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .icon {
            font-size: 400px;
            margin-bottom: 40px;
        }
        .text {
            font-size: 140px;
            font-weight: 700;
            letter-spacing: -4px;
        }
    </style>
</head>
<body>
    <div class="logo">
        <div class="icon">🗓️</div>
        <div class="text">Keepgate</div>
    </div>
</body>
</html>
